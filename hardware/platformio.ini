[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial
monitor_speed  = 115200
upload_speed   = 921600

; Otimização de tamanho + velocidade
build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=0

; Ignorar biblioteca incompatível
lib_ignore =
    ESPAsyncTCP

; Dependências
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.0
    ; painlessMesh — rede mesh auto-organizável entre ESP32s
    ; Cada nó com acesso ao WiFi vira ponte para o broker MQTT automaticamente
    painlessMesh@^1.5.0
    ; AsyncTCP compatível com ESP-IDF mais recente
    https://github.com/me-no-dev/AsyncTCP.git
