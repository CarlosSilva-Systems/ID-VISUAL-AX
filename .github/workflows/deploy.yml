name: CI/CD — Build & Deploy

# Executa apenas em push na branch main
on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # Nome do repositório em minúsculas (obrigatório para GHCR)
  REPO: carlossilva-systems/id-visual-ax

jobs:
  # ── Job 1: Build e Push das imagens Docker ─────────────────────────────────
  build-and-push:
    name: Build e Push — GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Necessário para push no GHCR

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx (builder avançado)
        uses: docker/setup-buildx-action@v3

      # ── API (Backend FastAPI) ──────────────────────────────────────────────
      - name: Build e Push — API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}-api:latest
            ghcr.io/${{ env.REPO }}-api:${{ github.sha }}
          # Cache entre execuções (reduz tempo de build)
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # ── Frontend (React + Nginx) ───────────────────────────────────────────
      - name: Build e Push — Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}-frontend:latest
            ghcr.io/${{ env.REPO }}-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # ── Mosquitto (MQTT Broker) ────────────────────────────────────────────
      - name: Build e Push — Mosquitto
        uses: docker/build-push-action@v6
        with:
          context: ./mosquitto
          file: ./mosquitto/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}-mosquitto:latest
          cache-from: type=gha,scope=mosquitto
          cache-to: type=gha,mode=max,scope=mosquitto

  # ── Job 2: Deploy no Servidor Ubuntu ───────────────────────────────────────
  deploy:
    name: Deploy — Servidor Ubuntu
    runs-on: ubuntu-latest
    needs: build-and-push   # Só roda se o build passou

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Copia o docker-compose.ci.yml para o servidor antes de subir os containers
      - name: Copiar docker-compose.ci.yml para o servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.ci.yml"
          target: ${{ secrets.DEPLOY_PATH }}

      # Conecta no servidor e executa o deploy
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "🔐 Autenticando no GHCR..."
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            echo "📦 Fazendo pull das novas imagens..."
            docker compose -f docker-compose.ci.yml pull

            echo "🚀 Subindo containers (zero-downtime replace)..."
            docker compose -f docker-compose.ci.yml up -d

            echo "🔒 Logout do registry..."
            docker logout ghcr.io

            echo "🧹 Removendo imagens antigas..."
            docker image prune -f

            echo "✅ Deploy concluído em $(date '+%Y-%m-%d %H:%M:%S')"

      # Verifica se a API está respondendo após o deploy
      - name: Health Check da API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "⏳ Aguardando containers iniciarem..."
            sleep 15

            echo "🔍 Status dos containers:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "🔍 Verificando API..."
            if curl -sf http://localhost:8000/ > /dev/null 2>&1; then
              echo "✅ API respondendo normalmente"
            else
              echo "⚠️  API não respondeu — verificando logs:"
              docker logs id_visual_api --tail=30
              exit 1
            fi
