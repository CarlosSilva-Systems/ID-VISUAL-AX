name: CI/CD — Build & Deploy

# Executa apenas em push na branch main
on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # Nome do repositório em minúsculas (obrigatório para GHCR)
  REPO: carlossilva-systems/id-visual-ax

jobs:
  # ── Job 1: Build e Push das imagens Docker ─────────────────────────────────
  build-and-push:
    name: Build e Push — GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Necessário para push no GHCR

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx (builder avançado)
        uses: docker/setup-buildx-action@v3

      # ── API (Backend FastAPI) ──────────────────────────────────────────────
      - name: Build e Push — API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}-api:latest
            ghcr.io/${{ env.REPO }}-api:${{ github.sha }}
          # Cache entre execuções (reduz tempo de build)
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # ── Frontend (React + Nginx) ───────────────────────────────────────────
      - name: Build e Push — Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}-frontend:latest
            ghcr.io/${{ env.REPO }}-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # ── Mosquitto (MQTT Broker) ────────────────────────────────────────────
      - name: Build e Push — Mosquitto
        uses: docker/build-push-action@v6
        with:
          context: ./mosquitto
          file: ./mosquitto/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}-mosquitto:latest
          cache-from: type=gha,scope=mosquitto
          cache-to: type=gha,mode=max,scope=mosquitto

  # ── Job 2: Deploy no Servidor Ubuntu (Self-Hosted Runner) ──────────────────
  deploy:
    name: Deploy — Servidor Ubuntu
    # Roda diretamente no servidor de produção via self-hosted runner.
    # Não precisa de SSH externo — os comandos executam localmente na máquina.
    runs-on: self-hosted
    needs: build-and-push   # Só roda se o build passou

    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      COMPOSE_FILE: docker-compose.ci.yml

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        run: |
          echo "${{ secrets.GH_PAT }}" | docker login ghcr.io \
            -u ${{ github.repository_owner }} --password-stdin

      - name: Preparar diretório de deploy
        # Copia o docker-compose.ci.yml para o DEPLOY_PATH onde o .env já existe.
        # O Docker Compose procura o .env na mesma pasta do compose file,
        # por isso rodamos tudo a partir do DEPLOY_PATH.
        run: cp "$GITHUB_WORKSPACE/$COMPOSE_FILE" "$DEPLOY_PATH/$COMPOSE_FILE"

      - name: Pull das novas imagens
        working-directory: ${{ secrets.DEPLOY_PATH }}
        run: docker compose -f "$COMPOSE_FILE" pull

      - name: Subir containers (zero-downtime replace)
        working-directory: ${{ secrets.DEPLOY_PATH }}
        run: docker compose -f "$COMPOSE_FILE" up -d

      - name: Logout do registry e limpeza de imagens antigas
        run: |
          docker logout ghcr.io
          docker image prune -f

      - name: Health Check da API
        run: |
          echo "⏳ Aguardando containers iniciarem (15s)..."
          sleep 15

          echo "🔍 Status dos containers:"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

          echo ""
          echo "🔍 Verificando API..."
          if curl -sf http://localhost:8000/ > /dev/null 2>&1; then
            echo "✅ API respondendo normalmente"
          else
            echo "⚠️  API não respondeu — verificando logs:"
            docker logs id_visual_api --tail=30
            exit 1
          fi

          echo ""
          echo "✅ Deploy concluído em $(date '+%Y-%m-%d %H:%M:%S')"
