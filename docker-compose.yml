services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-odoo_backend}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  mosquitto:
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - default

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./.env:/app/.env
      # Volume persistente para armazenamento de firmware OTA (.bin files)
      # Montado em /app/storage/ota/firmware dentro do container
      # Permite que arquivos de firmware persistam entre restarts do container
      - ota_firmware:/app/storage/ota/firmware
    ports:
      - "8000:8000"
    env_file:
      - .env  # Inclui ODOO_SERVICE_LOGIN, ODOO_SERVICE_PASSWORD e outras variáveis
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./.env:/app/.env
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - api

volumes:
  postgres_data:
  # Volume Docker para armazenamento persistente de firmware OTA
  # Armazena arquivos .bin de firmware para atualizações ESP32
  # Persiste entre restarts e rebuilds do container
  # Localização no host: gerenciado pelo Docker (docker volume inspect ota_firmware)
  ota_firmware:
    driver: local
