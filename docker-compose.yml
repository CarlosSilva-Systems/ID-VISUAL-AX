services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-odoo_backend}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  mosquitto:
    build:
      context: ./mosquitto
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "1883:1883"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    volumes:
      # Volume persistente para armazenamento de firmware OTA (.bin files)
      - ota_firmware:/app/storage/ota/firmware
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    env_file:
      - .env
    volumes:
      # Bind mount do código fonte — Vite HMR reflete mudanças sem rebuild
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - api

volumes:
  postgres_data:
  # Volume Docker para armazenamento persistente de firmware OTA
  # Armazena arquivos .bin de firmware para atualizações ESP32
  # Persiste entre restarts e rebuilds do container
  # Localização no host: gerenciado pelo Docker (docker volume inspect ota_firmware)
  ota_firmware:
    driver: local
