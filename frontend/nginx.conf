server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para melhor performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # index.html NUNCA deve ser cacheado.
    # Vite gera nomes com hash para JS/CSS (ex: main.abc123.js),
    # mas o index.html precisa ser sempre o mais recente para
    # o browser carregar os assets corretos após cada deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Cache agressivo para assets estáticos gerados pelo Vite
    # (Vite gera nomes de arquivo com hash, então podem ter cache longo)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy reverso para a API — encaminha /api/* para o backend
    # Mantém o prefixo /api/ pois o backend espera /api/v1/...
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte a WebSocket (necessário para /api/v1/andon/ws)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Suporte ao React Router — todas as rotas retornam index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
